stages:
  - check
  - build
  - test
  - rewards

lint:
  stage: check
  image: node:24
  before_script:
    - corepack enable pnpm
    - pnpm install --frozen-lockfile
  script:
    - pnpm lint:check
    - pnpm format:check

build:
  stage: build
  image: node:24
  before_script:
    - corepack enable pnpm
    - pnpm install --frozen-lockfile
  script:
    - pnpm build

test:
  stage: test
  image: node:24
  before_script:
    - corepack enable pnpm
    - pnpm install --frozen-lockfile
  script:
    - pnpm test:coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    paths:
      - coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml

calculate-testnet-rewards:
  stage: rewards
  image: node:24
  rules:
    - if: ($CI_PIPELINE_SOURCE == "schedule" || $CI_PIPELINE_SOURCE == "web") && $REWARD_EPOCH
  before_script:
    - corepack enable pnpm
    - pnpm install --frozen-lockfile
    - git config user.name "CI Bot"
    - git config user.email "ci@flarenetwork.com"
    - git remote set-url origin "https://oauth2:${GITLAB_PUSH_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
    - git fetch origin testnet
    - git checkout testnet
  script:
    - echo "REWARD_EPOCH=${REWARD_EPOCH} UPTIME_THRESHOLD=${UPTIME_THRESHOLD:-2}"
    - pnpm calculate-testnet-rewards -e "${REWARD_EPOCH}" -t "${UPTIME_THRESHOLD:-2}"
    - |
      if [ -n "$(git status --porcelain calculated-files/)" ]; then
        git add calculated-files/
        git commit -m "chore: coston2 rewards for epoch ${REWARD_EPOCH}"
        git push origin testnet
      else
        echo "No new reward data"
      fi

debug-vars:
  stage: rewards
  image: node:24
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - echo "REWARD_NETWORK=${REWARD_NETWORK}"
    - echo "REWARD_EPOCH=${REWARD_EPOCH}"
    - echo "CI_PIPELINE_SOURCE=${CI_PIPELINE_SOURCE}"

auto-testnet-rewards:
  stage: rewards
  image: node:24
  rules:
    - if: $REWARD_NETWORK == "coston2"
  before_script:
    - corepack enable pnpm
    - pnpm install --frozen-lockfile
    - git config user.name "CI Bot"
    - git config user.email "ci@flarenetwork.com"
    - git remote set-url origin "https://oauth2:${GITLAB_PUSH_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
    - git fetch origin testnet
    - git checkout testnet
  script:
    - pnpm auto-testnet-rewards
    - |
      if [ -n "$(git status --porcelain calculated-files/ generated-files/)" ]; then
        git add calculated-files/ generated-files/
        EPOCH=$(git diff --cached --name-only | grep -oP 'reward-epoch-\K\d+' | sort -n | tail -1 || echo "unknown")
        git commit -m "chore: coston2 rewards for epoch ${EPOCH}"
        git push origin testnet
      else
        echo "No new reward data"
      fi
