stages:
  - check
  - test

lint:
  stage: check
  image: node:24
  before_script:
    - corepack enable pnpm
    - pnpm install --frozen-lockfile
  script:
    - pnpm lint:check
    - pnpm format:check

test:
  stage: test
  image: node:24
  before_script:
    - corepack enable pnpm
    - pnpm install --frozen-lockfile
  script:
    - pnpm test:coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    paths:
      - coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
